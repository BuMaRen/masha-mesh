syntax = "proto3";

package mesh;

option go_package = "pkg/ctrl/mesh;mesh";

enum OpType {
  ADDED = 0;
  DELETED = 1;
  MODIFIED = 2;
}

message EndpointIPs{
    repeated string endpoint_ips = 1;
}

message ClientSubscriptionEvent {
    int64 revision = 1;
    OpType op_type = 2;
    map<string, EndpointIPs> endpoints = 3;
}

message SubscriptionRequest {
    string sidecar_id = 1;
    string service_name = 2;
}

// control face of my mesh
service MeshCtrl {
    // for client's subscription
    rpc Subscribe(SubscriptionRequest) returns (stream ClientSubscriptionEvent);
}