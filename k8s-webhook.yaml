apiVersion: v1
kind: Namespace
metadata:
  name: webhook-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: webhook-sa
  namespace: webhook-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: webhook-certs
  namespace: webhook-system
data:
  # 这些将由脚本生成并填充
  tls.crt: ""
  tls.key: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sidecar-injector
  namespace: webhook-system
  labels:
    app: sidecar-injector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sidecar-injector
  template:
    metadata:
      labels:
        app: sidecar-injector
    spec:
      serviceAccountName: webhook-sa
      containers:
      - name: webhook
        image: sidecar-injector:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8443
          name: webhook
        volumeMounts:
        - name: webhook-certs
          mountPath: /etc/webhook/certs
          readOnly: true
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8443
            scheme: HTTPS
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8443
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: webhook-certs
        configMap:
          name: webhook-certs
---
apiVersion: v1
kind: Service
metadata:
  name: sidecar-injector
  namespace: webhook-system
  labels:
    app: sidecar-injector
spec:
  ports:
  - port: 443
    targetPort: 8443
    name: webhook
  selector:
    app: sidecar-injector
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: sidecar-injector
webhooks:
- name: mutate.sidecar.webhook.io
  clientConfig:
    service:
      name: sidecar-injector
      namespace: webhook-system
      path: "/mutate"
    caBundle: "" # 将由脚本填充
  rules:
  - operations: ["CREATE"]
    apiGroups: [""]
    apiVersions: ["v1"]
    resources: ["pods"]
    scope: "Namespaced"
  namespaceSelector:
    matchLabels:
      sidecar-injection: enabled
  admissionReviewVersions: ["v1"]
  sideEffects: None
  timeoutSeconds: 5
  failurePolicy: Fail