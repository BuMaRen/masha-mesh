apiVersion: apps/v1
kind: Deployment
metadata:
  name: mesh-cli
spec:
  selector:
    matchLabels:
      app: mesh-cli
  template:
    metadata:
      labels:
        app: mesh-cli
    spec:
      containers:
      - name: mesh-cli
        image: hjmasha/mesh-cli:v0.1.61
        command: ["/app/mesh-cli"]
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
          requests:
            memory: "64Mi"
            cpu: "250m"
