apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: containers.masha.io
spec:
  names:
    plural: containers
    singular: container
    kind: Container
    shortNames:
      - ctr
  scope: Namespaced
  group: masha.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                name:
                  type: string
                image:
                  type: string
                command:
                  type: array
                  items:
                    type: string
                resources:
                  type: object
                  properties:
                    limits:
                      type: object
                      properties:
                        memory:
                          type: string
                        cpu:
                          type: string
                    requests:
                      type: object
                      properties:
                        memory:
                          type: string
                        cpu:
                          type: string