apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mesh-ctrl
rules:
  - apiGroups: ["discovery.k8s.io"]
    resources: ["services", "endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mesh-ctrl
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mesh-ctrl
subjects:
  - kind: ServiceAccount
    name: mesh-ctrl
    namespace: default
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mesh-ctrl
  namespace: default
