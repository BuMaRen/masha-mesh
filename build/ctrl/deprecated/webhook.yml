apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: webhook
webhooks:
  - name: webhook.mesh.local
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Ignore
    clientConfig:
      service:
        namespace: default
        name: mesh-ctrl
        path: /mutate
        port: 443
      # 占位值；部署脚本会自动替换成实际证书的 base64 内容
      caBundle: 
    matchConditions:
      - name: "match-pods"
        # 带有label masha-webhook=enabled 的 Pod 会被 webhook 处理。
        expression: "object.metadata.labels['masha-webhook'] == 'enabled'"
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
