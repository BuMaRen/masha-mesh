apiVersion: v1
kind: Service
metadata:
  name: mesh-ctrl
  namespace: default
  labels:
    app: mesh-ctrl
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 50051
      targetPort: mesh-ctrl-port
      protocol: TCP
    - name: https
      port: 443
      targetPort: webhook-port
      protocol: TCP
  selector:
    app: mesh-ctrl
