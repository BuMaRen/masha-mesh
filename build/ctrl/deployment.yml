apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mesh-ctrl
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["services", "endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["masha.io"]
    resources: ["containers"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mesh-ctrl
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mesh-ctrl
subjects:
  - kind: ServiceAccount
    name: mesh-ctrl
    namespace: default
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mesh-ctrl
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mesh-ctrl
spec:
  selector:
    matchLabels:
      app: mesh-ctrl
  template:
    metadata:
      labels:
        app: mesh-ctrl
    spec:
      serviceAccountName: mesh-ctrl
      containers:
      - name: mesh-ctrl
        image: hjmasha/mesh-ctrl:t0.1.9
        command: ["/app/mesh-ctrl"]
        args: ["--cert-file", "/etc/webhook/certs/tls.crt", "--key-file", "/etc/webhook/certs/tls.key", "--grpc-address", ":50051", "--grpc-network", "tcp", "--gvr-group", "masha.io", "--gvr-version", "v1", "--gvr-resource", "containers", "--injection-label", "masha.io/injection", "--metrics-address", ":9090", "--namespace", "default", "--pod-name", "test-pod", "--webhook-address", ":443"]
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
          requests:
            memory: "64Mi"
            cpu: "250m"
        ports:
        - containerPort: 50051
          name: grpc-port
        - containerPort: 443
          name: webhook-port
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        securityContext:
          capabilities:
            add: ["NET_BIND_SERVICE"]
        volumeMounts:
        - name: webhook-certs
          mountPath: /etc/webhook/certs
          readOnly: true
      volumes:
        - name: webhook-certs
          secret:
            secretName: mesh-webhook-certs
            defaultMode: 0400
