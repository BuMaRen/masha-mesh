apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: webhook-config
webhooks:
  - name: webhook.example.com
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: "default"
    clientConfig:
      service:
        name: mesh-ctrl
        namespace: default
        port: 443
        path: "/mutate"
      caBundle: 
    rules:
      - operations: ["CREATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        scope: "Namespaced"
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    timeoutSeconds: 10