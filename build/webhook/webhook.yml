# 1) 运行 webhook 服务本身（HTTPS）。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-svc
  namespace: default
spec:
  selector:
    matchLabels:
      app: test-svc
  template:
    metadata:
      labels:
        app: test-svc
    spec:
      containers:
      - name: webhook
        image: hjmasha/mesh-webhook:v0.1.55
        command: ["/app/webhook"]
        args:
        - "--address"
        - ":8443"
        - "--crt"
        - "/etc/webhook/certs/tls.crt"
        - "--key"
        - "/etc/webhook/certs/tls.key"
        ports:
        - containerPort: 8443
          name: https
        volumeMounts:
        - name: tls-certs
          mountPath: /etc/webhook/certs
          readOnly: true
      volumes:
      - name: tls-certs
        secret:
          # 由 deploy-webhook.sh 的 upsert_tls_secret 创建/更新
          secretName: test-svc-tls
---
# 2) 给 apiserver 一个稳定入口，转发到 webhook Pod 的 8443。
apiVersion: v1
kind: Service
metadata:
  name: test-svc
  namespace: default
spec:
  selector:
    app: test-svc
  ports:
  - name: https
    port: 443
    targetPort: https
---
# 3) 注册 mutating webhook 规则。
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: test-svc
webhooks:
- name: test-svc.mesh.local
  admissionReviewVersions: ["v1"]
  sideEffects: None
  failurePolicy: Ignore
  clientConfig:
    service:
      namespace: default
      name: test-svc
      path: /mutate
      port: 443
    # 占位值；部署脚本会自动替换成实际证书的 base64 内容
    caBundle: Cg==
  rules:
  - apiGroups: [""]
    apiVersions: ["v1"]
    operations: ["CREATE"]
    resources: ["pods"]
