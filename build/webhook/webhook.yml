apiVersion: v1
kind: ServiceAccount
metadata:
  name: test-svc
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-svc
  namespace: default
spec:
  selector:
    matchLabels:
      app: test-svc
  template:
    metadata:
      labels:
        app: test-svc
    spec:
      serviceAccountName: test-svc
      containers:
      - name: webhook
        image: hjmasha/mesh-webhook:v0.1.55
        command: ["/app/webhook"]
        args:
          - "--address"
          - ":8443"
          - "--crt"
          - "/etc/webhook/certs/tls.crt"
          - "--key"
          - "/etc/webhook/certs/tls.key"
        ports:
        - containerPort: 8443
          name: https
        volumeMounts:
        - name: tls-certs
          mountPath: /etc/webhook/certs
          readOnly: true
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
          requests:
            memory: "64Mi"
            cpu: "250m"
      volumes:
      - name: tls-certs
        secret:
          secretName: test-svc-tls
---
apiVersion: v1
kind: Service
metadata:
  name: test-svc
  namespace: default
spec:
  selector:
    app: test-svc
  ports:
  - name: https
    port: 443
    protocol: TCP
    targetPort: https
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: test-svc
webhooks:
- name: test-svc.mesh.local
  admissionReviewVersions:
  - v1
  clientConfig:
    service:
      namespace: default
      name: test-svc
      path: /mutate
      port: 443
    caBundle: 
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - pods
  failurePolicy: Ignore
  sideEffects: None
  timeoutSeconds: 10
