# Server 侧测试清单：包含 Service + Deployment
# 目标：让 server Pod 同样经 sidecar 接管，形成双 sidecar 链路
apiVersion: v1
kind: Service
metadata:
  # Service 名称，client 通过 test-svr:8081 访问
  name: test-svr
  # 与测试 Pod 放在同一命名空间
  namespace: default
  labels:
    # 业务标签，用于可读性和筛选
    app: test-svr
spec:
  # 集群内访问服务
  type: ClusterIP
  ports:
    # Service 暴露 8081，转发到 Pod 内 test-svr-port
    - port: 8081
      targetPort: test-svr-port
      name: test-svr-port
      protocol: TCP
  selector:
    # 选择带 app=test-svr 的 Pod
    app: test-svr
---
# test-svr Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  # Deployment 名称
  name: test-svr
  namespace: default
spec:
  # 单副本便于定位单条流量路径
  replicas: 1
  selector:
    matchLabels:
      # Deployment 通过该标签选 Pod
      app: test-svr
  template:
    metadata:
      labels:
        # 业务标签
        app: test-svr
        # 触发 mesh-ctrl webhook 自动注入 sidecar
        masha-webhook: enabled
    spec:
      # 在 Pod 启动时写入 iptables 规则
      initContainers:
      - name: init-iptables
        # 含 iptables 工具
        image: wbitt/network-multitool:minimal
        securityContext:
          capabilities:
            # 修改 netfilter 需要 NET_ADMIN
            add: ["NET_ADMIN"]
        command:
        - sh
        - -c
        - |
          # 严格执行脚本
          set -eu
          # sidecar(uid=0) 自身流量直接放行，防止 sidecar 自己被劫持
          iptables -t nat -A OUTPUT -m owner --uid-owner 0 -j RETURN
          # 放行本地回环流量
          iptables -t nat -A OUTPUT -d 127.0.0.1/32 -j RETURN
          # 放行已发往 15001 的流量，避免重复重定向
          iptables -t nat -A OUTPUT -p tcp --dport 15001 -j RETURN
          # 其余出站 TCP 全部转到 sidecar
          iptables -t nat -A OUTPUT -p tcp -j REDIRECT --to-port 15001

          # 放行已到达 sidecar 端口的入站连接
          iptables -t nat -A PREROUTING -p tcp --dport 15001 -j RETURN
          # 放行 sidecar 动态配置端口
          iptables -t nat -A PREROUTING -p tcp --dport 9090 -j RETURN
          # 其余入站 TCP 一律先进入 sidecar
          iptables -t nat -A PREROUTING -p tcp -j REDIRECT --to-port 15001
      containers:
      # 辅助容器：给 server Pod 内 sidecar 下发订阅，保证 server 侧 sidecar也有缓存
      - name: sidecar-bootstrap
        image: curlimages/curl:8.12.1
        command: ["/bin/sh", "-c"]
        args:
          - |
            # 严格执行
            set -eu
            # 等待 sidecar 动态配置接口 ready
            echo "[server-bootstrap] wait sidecar dynamic config endpoint on 127.0.0.1:9090"
            # 给本 Pod sidecar 订阅 test-svr；200/400 都视为已准备好
            until curl -sS -o /tmp/bootstrap.out -w "%{http_code}" -X POST http://127.0.0.1:9090/service/test-svr | grep -Eq "200|400"; do
              echo "[server-bootstrap] sidecar not ready, retry in 2s"
              sleep 2
            done
            # 打印订阅结果
            echo "[server-bootstrap] subscribe response:"
            cat /tmp/bootstrap.out || true
            # 保持容器存活，避免重复重启刷日志
            sleep infinity
        resources:
          # bootstrap 容器资源上限
          limits:
            memory: "64Mi"
            cpu: "200m"
          # bootstrap 容器资源请求
          requests:
            memory: "32Mi"
            cpu: "50m"
      # 业务 server 容器
      - name: test-svr
        image: hjmasha/test-svr:v0.1.2
        command: ["/app/test-svr"]
        securityContext:
          # 业务容器使用非 root，避免与 sidecar(uid=0) 冲突
          runAsUser: 1001
          runAsGroup: 1001
          runAsNonRoot: true
        resources:
          # server 容器资源上限
          limits:
            memory: "128Mi"
            cpu: "500m"
          # server 容器资源请求
          requests:
            memory: "64Mi"
            cpu: "250m"
        ports:
        # 业务服务监听端口，供 Service targetPort 使用
        - containerPort: 8081
          name: test-svr-port
