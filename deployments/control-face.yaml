apiVersion: v1
kind: Namespace
metadata:
  name: masha-mesh
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-face
  namespace: masha-mesh
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: control-face
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: control-face
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: control-face
subjects:
  - kind: ServiceAccount
    name: control-face
    namespace: masha-mesh
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-face
  namespace: masha-mesh
  labels:
    app: control-face
    component: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-face
  template:
    metadata:
      labels:
        app: control-face
        component: control-plane
    spec:
      serviceAccountName: control-face
      containers:
        - name: control-face
          image: control-face:latest
          imagePullPolicy: IfNotPresent
          args:
            - "-v=2"
            - "-port=8080"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: control-face
  namespace: masha-mesh
  labels:
    app: control-face
    component: control-plane
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: control-face
